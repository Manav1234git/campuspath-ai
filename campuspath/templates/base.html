<!DOCTYPE html>
<html>
<head>
    <title>CampusPath AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
<nav class="navbar navbar-expand-lg bg-dark navbar-dark">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">CampusPath AI</a>

        <div>
            <a class="btn btn-outline-light btn-sm me-2" href="/">Home</a>

            {% if user.is_authenticated %}
                <a class="btn btn-success btn-sm me-2" href="{% url 'dashboard' %}">
                    Dashboard
                </a>

                <a class="btn btn-danger btn-sm" href="{% url 'logout' %}">
                    Logout
                </a>

            {% else %}
                <a class="btn btn-primary btn-sm me-2" href="{% url 'login' %}">
                    Login
                </a>

                <a class="btn btn-warning btn-sm" href="{% url 'register' %}">
                    Register
                </a>
            {% endif %}
        </div>
    </div>
</nav>

<div class="container mt-5">
    {% block content %}
    {% endblock %}
</div>
</body>
</html>
