{% extends 'base.html' %}

{% block content %}
<div class="card shadow">
    <div class="card-body">
        <h3>Delete Project</h3>

        <p>Are you sure you want to delete <strong>{{ project.title }}</strong>?</p>

        <form method="POST">
            {% csrf_token %}
            <button class="btn btn-danger">Yes, Delete</button>
            <a href="{% url 'roadmap_detail' project.roadmap.id %}" class="btn btn-secondary">
                Cancel
            </a>
        </form>
    </div>
</div>
{% endblock %}
