{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-7">
        <div class="card shadow">
            <div class="card-body">
                <h3>Add Task</h3>
                <p class="text-muted">Milestone: {{ milestone.title }}</p>

                <form method="POST">
                    {% csrf_token %}
                    {{ form.as_p }}

                    <button class="btn btn-primary w-100">
                        Save Task
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
