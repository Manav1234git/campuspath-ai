{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-7">
        <div class="card shadow">
            <div class="card-body">
                <h3>Edit Course Recommendation</h3>

                <form method="POST">
                    {% csrf_token %}
                    {{ form.as_p }}

                    <button class="btn btn-success w-100">
                        Update Course
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
