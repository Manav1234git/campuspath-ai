{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow">
            <div class="card-body">
                <h3 class="mb-4">Create Roadmap</h3>

                <form method="POST">
                    {% csrf_token %}
                    {{ form.as_p }}

                    <button class="btn btn-primary w-100">
                        Save Roadmap
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
