{% extends 'base.html' %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2>My Skills</h2>
    <a href="{% url 'add_skill' %}" class="btn btn-primary">Add Skill</a>
</div>

{% if skills %}
<div class="card shadow-sm">
    <div class="card-body">
        {% for item in skills %}
        <div class="d-flex justify-content-between align-items-center py-3 border-bottom">
            <div>
                <h5 class="mb-1">{{ item.skill_name }}</h5>
                <span class="badge bg-info text-dark">
                    {{ item.get_proficiency_level_display }}
                </span>
            </div>

            <div class="d-flex gap-2">
                <a href="{% url 'edit_skill' item.id %}" class="btn btn-warning btn-sm">
                    Edit
                </a>

                <a href="{% url 'delete_skill' item.id %}" class="btn btn-danger btn-sm">
                    Delete
                </a>
            </div>
        </div>
        {% endfor %}
    </div>
</div>
{% else %}
<div class="alert alert-warning">
    No skills added yet.
</div>
{% endif %}
{% endblock %}
