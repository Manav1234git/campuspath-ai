{% extends 'base.html' %}

{% block content %}
<div class="card shadow">
    <div class="card-body">
        <h3>Delete Skill</h3>

        <p>
            Are you sure you want to delete
            <strong>{{ profile_skill.skill_name }}</strong>?
        </p>

        <form method="POST">
            {% csrf_token %}
            <button class="btn btn-danger">Yes, Delete</button>
            <a href="{% url 'my_skills' %}" class="btn btn-secondary">Cancel</a>
        </form>
    </div>
</div>
{% endblock %}
